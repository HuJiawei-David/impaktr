<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tierGradient6BUILDER" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26BDE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26BDE2CC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="white" stroke="url(#tierGradient6BUILDER)" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- SDG Icon Background -->
  <circle cx="32" cy="28" r="12" fill="#26BDE2" opacity="0.1"/>
  
  <!-- SDG Icon -->
  <text x="32" y="32" text-anchor="middle" font-size="16" font-family="Arial, sans-serif">💧</text>
  
  <!-- Tier Icon -->
  <circle cx="48" cy="16" r="8" fill="#26BDE2" stroke="white" stroke-width="2"/>
  <text x="48" y="20" text-anchor="middle" font-size="10" font-family="Arial, sans-serif">🔨</text>
  
  <!-- Badge Text -->
  <text x="32" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#333">Water Builder</text>
  
  <!-- SDG Number -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#666">SDG 6</text>
</svg>