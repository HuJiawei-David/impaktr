<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rankGradientAMBASSADOR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4CC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#rankGradientAMBASSADOR)" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Rank Icon -->
  <text x="32" y="36" text-anchor="middle" font-size="20" font-family="Arial, sans-serif">🌍</text>
  
  <!-- Rank Name -->
  <text x="32" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Ambassador</text>
  
  <!-- Description (abbreviated) -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="white" opacity="0.8">Representing impact excellence</text>
</svg>